<!DOCTYPE html>
<html lang='{{ page.lang | default: site.lang | default: 'en' }}'>
  {% include head.html %}
  <body>
    <div class='layout'>
      {% include header.html %}
      <main class='main'>
        <h1>{{ page.title }}</h1>
        <h3><i>{{ page.instrumentation }}</i></h3>
        {% assign names = page.permalink | split: "/" %}
        <img alt="{{ names[1] }}" src="{{ base_path }}/assets/images/{{ names[1] }}.png" width="auto">
        {{ content }}
        <a href='{{ site.url }}/projects' ><< back</a>
      </main>
      {% include footer.html %}
    </div>
  </body>
</html>
