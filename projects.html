---
layout: default
title: projects
---
{% for project in site.projects reversed %}
  {% cycle 'add row' : '<div class="row">', '', '' %}
      <div class="column column-33">
          <div class="projects-preview">
              <a href="{{ project.url | prepend: base_path }}">
                <div class="preview-images">
                  {% assign names = project.permalink | split: "/" %}
                  <img src="{{ base_path }}/assets/images/{{ names[1] }}-preview.png">
                  <div class="overlay">
                    <div class="text">{{ project.title }}<br><br><small><i>{{ project.instrumentation }}</i><br><small>{{ project.year }}</small></small></div>
                  </div>
                </div>
              </a>
          </div>
      </div>
  {% cycle 'end row' : '', '', '</div>' %}
{% endfor %}
