---
layout: default
title: projects
---
<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>
    <h1>{{ site.author }}</h1>
  </head>
  <body>
    <ul>
      {% for project in site.projects %}
        <li>
          <h2><a href="{{ project.url }}">{{ project.name }}</a></h2>
          <h3>{{ project.instruments }}</h3>
          <h3>{{ project.year }}</h3>
          <p>{{ project.content | markdownify }}</p>
        </li>
      {% endfor %}
    </ul>
  </body>

</html>
