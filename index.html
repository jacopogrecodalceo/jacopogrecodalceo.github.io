---
layout: default
title: home
---
<div>
  {% for project in site.projects reversed %}
    {% if project.homepage %}
      {% assign names = project.permalink | split: "/" %}
      <a href="{{ project.url }}"><img class="index-img" alt="{{ project.title }}" src="{{ base_path }}/assets/images/{{ names[1] }}.png"></a>
    {% endif %}
  {% endfor %}
</div>
